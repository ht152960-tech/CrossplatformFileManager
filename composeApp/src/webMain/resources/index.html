<!DOCTYPE html>
<html lang="zh-Hans">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CrossplatformFileManager</title>
    <link type="text/css" rel="stylesheet" href="styles.css">
    <script>
        (function () {
            const DB_NAME = "file-atlas-db";
            const DB_VERSION = 2;
            const STORE_NAME = "snapshots";
            const HANDLE_STORE = "browser-handles";
            const SNAPSHOT_ID = "default";
            const LOCAL_STORAGE_KEY = "file-atlas.snapshot";
            const BROWSER_API_NAME = "fileAtlasBrowser";

            function openDatabase() {
                return new Promise((resolve, reject) => {
                    const request = indexedDB.open(DB_NAME, DB_VERSION);
                    request.onupgradeneeded = () => {
                        const db = request.result;
                        if (!db.objectStoreNames.contains(STORE_NAME)) {
                            db.createObjectStore(STORE_NAME, { keyPath: "id" });
                        }
                        if (!db.objectStoreNames.contains(HANDLE_STORE)) {
                            db.createObjectStore(HANDLE_STORE, { keyPath: "id" });
                        }
                    };
                    request.onsuccess = () => resolve(request.result);
                    request.onerror = () => reject(request.error || new Error("IndexedDB open failed"));
                });
            }

            function readViaIndexedDb() {
                return openDatabase().then((db) => {
                    return new Promise((resolve, reject) => {
                        const tx = db.transaction(STORE_NAME, "readonly");
                        const store = tx.objectStore(STORE_NAME);
                        const request = store.get(SNAPSHOT_ID);
                        request.onsuccess = () => {
                            const row = request.result;
                            resolve(row ? row.payload : null);
                        };
                        request.onerror = () => reject(request.error || new Error("IndexedDB read failed"));
                        tx.oncomplete = () => db.close();
                        tx.onabort = () => {
                            db.close();
                            reject(tx.error || new Error("IndexedDB read aborted"));
                        };
                        tx.onerror = () => {
                            db.close();
                            reject(tx.error || new Error("IndexedDB read error"));
                        };
                    });
                });
            }

            function writeViaIndexedDb(encoded) {
                return openDatabase().then((db) => {
                    return new Promise((resolve, reject) => {
                        const tx = db.transaction(STORE_NAME, "readwrite");
                        const store = tx.objectStore(STORE_NAME);
                        store.put({ id: SNAPSHOT_ID, payload: encoded, updatedAt: Date.now() });
                        tx.oncomplete = () => {
                            db.close();
                            resolve();
                        };
                        tx.onabort = () => {
                            db.close();
                            reject(tx.error || new Error("IndexedDB write aborted"));
                        };
                        tx.onerror = () => {
                            db.close();
                            reject(tx.error || new Error("IndexedDB write error"));
                        };
                    });
                });
            }

            function writeBrowserHandle(id, handle) {
                return openDatabase().then((db) => {
                    return new Promise((resolve, reject) => {
                        const tx = db.transaction(HANDLE_STORE, "readwrite");
                        const store = tx.objectStore(HANDLE_STORE);
                        store.put({ id: id, handle: handle, updatedAt: Date.now() });
                        tx.oncomplete = () => {
                            db.close();
                            resolve();
                        };
                        tx.onabort = () => {
                            db.close();
                            reject(tx.error || new Error("Handle write aborted"));
                        };
                        tx.onerror = () => {
                            db.close();
                            reject(tx.error || new Error("Handle write error"));
                        };
                    });
                });
            }

            function readBrowserHandle(id) {
                return openDatabase().then((db) => {
                    return new Promise((resolve, reject) => {
                        const tx = db.transaction(HANDLE_STORE, "readonly");
                        const store = tx.objectStore(HANDLE_STORE);
                        const request = store.get(id);
                        request.onsuccess = () => {
                            const row = request.result;
                            resolve(row ? row.handle : null);
                        };
                        request.onerror = () => reject(request.error || new Error("Handle read failed"));
                        tx.oncomplete = () => db.close();
                        tx.onabort = () => {
                            db.close();
                            reject(tx.error || new Error("Handle read aborted"));
                        };
                        tx.onerror = () => {
                            db.close();
                            reject(tx.error || new Error("Handle read error"));
                        };
                    });
                });
            }

            function encodeDraft(title, source, fileType, notes) {
                return [
                    `${title.length}:${title}`,
                    `${source.length}:${source}`,
                    `${fileType.length}:${fileType}`,
                    `${notes.length}:${notes}`,
                ].join("");
            }

            function generateId() {
                if (window.crypto && typeof window.crypto.randomUUID === "function") {
                    return window.crypto.randomUUID();
                }
                return `browser-${Date.now()}-${Math.random().toString(16).slice(2)}`;
            }

            function guessFileType(file) {
                if (file && file.type) {
                    const primary = file.type.split("/")[0];
                    if (primary) {
                        return primary.toUpperCase();
                    }
                }
                const name = file && file.name ? file.name : "";
                const dot = name.lastIndexOf(".");
                if (dot >= 0 && dot < name.length - 1) {
                    return name.substring(dot + 1).toUpperCase();
                }
                return "FILE";
            }

            function pickWithInput() {
                return new Promise((resolve) => {
                    const input = document.createElement("input");
                    input.type = "file";
                    input.style.display = "none";
                    input.addEventListener("change", () => {
                        const file = input.files && input.files[0];
                        input.remove();
                        if (!file) {
                            resolve(null);
                            return;
                        }
                        const id = generateId();
                        resolve(encodeDraft(
                            file.name || "Untitled file",
                            `browser-file:${id}`,
                            guessFileType(file),
                            "Selected from browser file picker."
                        ));
                    });
                    document.body.appendChild(input);
                    input.click();
                });
            }

            async function pickReference() {
                if (window.showOpenFilePicker) {
                    try {
                        const handles = await window.showOpenFilePicker({ multiple: false });
                        const handle = handles && handles[0];
                        if (!handle) {
                            return null;
                        }
                        const file = await handle.getFile();
                        const id = generateId();
                        await writeBrowserHandle(id, handle);
                        return encodeDraft(
                            file.name || "Untitled file",
                            `browser-handle:${id}`,
                            guessFileType(file),
                            "Selected from browser file picker."
                        );
                    } catch (error) {
                        return null;
                    }
                }
                return await pickWithInput();
            }

            async function resolveReference(source) {
                const prefix = "browser-handle:";
                if (!source || typeof source !== "string" || !source.startsWith(prefix)) {
                    return null;
                }
                const id = source.substring(prefix.length);
                if (!id) {
                    return null;
                }
                const handle = await readBrowserHandle(id);
                if (!handle) {
                    return null;
                }
                try {
                    const file = await handle.getFile();
                    return encodeDraft(
                        file.name || "Untitled file",
                        source,
                        guessFileType(file),
                        "Resolved from stored browser handle."
                    );
                } catch (error) {
                    return null;
                }
            }

            window.fileAtlasPersistence = {
                loadSnapshot: async function () {
                    if (!window.indexedDB) {
                        return window.localStorage.getItem(LOCAL_STORAGE_KEY);
                    }
                    try {
                        return await readViaIndexedDb();
                    } catch (error) {
                        return window.localStorage.getItem(LOCAL_STORAGE_KEY);
                    }
                },
                saveSnapshot: async function (encoded) {
                    if (!window.indexedDB) {
                        window.localStorage.setItem(LOCAL_STORAGE_KEY, encoded);
                        return;
                    }
                    try {
                        await writeViaIndexedDb(encoded);
                        window.localStorage.setItem(LOCAL_STORAGE_KEY, encoded);
                    } catch (error) {
                        window.localStorage.setItem(LOCAL_STORAGE_KEY, encoded);
                    }
                }
            };

            window[BROWSER_API_NAME] = {
                pickReference: pickReference,
                resolveReference: resolveReference
            };
        })();
    </script>
</head>
<body>
<svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 50 50" role="presentation">
    <circle cx="25" cy="25" r="20" stroke="#ccc" stroke-width="4" fill="none"/>
    <circle cx="25" cy="25" r="20" stroke="#333" stroke-width="4" fill="none" stroke-linecap="round"
            stroke-dasharray="90 125">
        <animateTransform attributeName="transform" type="rotate" from="0 25 25" to="360 25 25" dur="1s"
                          repeatCount="indefinite"/>
    </circle>
</svg>
<script type="application/javascript" src="composeApp.js"></script>
</body>
</html>
